<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Ops</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c0f;
    --surface: #0f1217;
    --border:  #1c2128;
    --text:    #dde3ea;
    --muted:   #566270;
    --green:   #22c55e;
    --yellow:  #eab308;
    --orange:  #f97316;
    --red:     #ef4444;
    --blue:    #3b82f6;
    --purple:  #a78bfa;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .logo {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  .logo-sub { color: var(--muted); font-weight: 400; }

  .divider {
    width: 1px;
    height: 16px;
    background: var(--border);
    flex-shrink: 0;
  }

  .metrics {
    display: flex;
    gap: 14px;
  }

  .metric {
    display: flex;
    align-items: baseline;
    gap: 4px;
    font-size: 0.78rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .metric-val { font-weight: 700; }
  .metric-lbl { color: var(--muted); font-size: 0.7rem; }

  .m-done   .metric-val { color: var(--green); }
  .m-active .metric-val { color: var(--yellow); }
  .m-failed .metric-val { color: var(--red); }

  .spacer { flex: 1; }

  #uptime {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  #conn-status {
    font-size: 0.72rem;
    white-space: nowrap;
  }
  #conn-status.connected    { color: var(--green); }
  #conn-status.disconnected { color: var(--red); }
  #conn-status.connecting   { color: var(--yellow); }

  .live {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }

  /* ── Agents ──────────────────────────────────────────────────── */
  #agents-grid {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .agent {
    padding: 18px 20px 16px;
    border-right: 1px solid var(--border);
    position: relative;
    transition: background 0.25s;
  }
  .agent:last-child { border-right: none; }

  /* top status stripe */
  .agent::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
    transition: background 0.3s;
  }
  .agent.ACTIVE::before  { background: var(--green); }
  .agent.IDLE::before    { background: var(--yellow); }
  .agent.WAITING::before { background: var(--orange); }

  .agent.ACTIVE  { background: rgba(34,197,94,.035); }
  .agent.OFFLINE { opacity: 0.45; }

  .agent-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 9px;
  }

  .agent-id {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .agent-emoji { font-size: 1rem; line-height: 1; }
  .agent-name  { font-size: 0.85rem; font-weight: 700; }

  .agent-status {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }
  .ACTIVE  .agent-status { color: var(--green); }
  .IDLE    .agent-status { color: var(--yellow); }
  .WAITING .agent-status { color: var(--orange); }
  .OFFLINE .agent-status { color: var(--muted); }

  .agent-task {
    font-size: 0.81rem;
    line-height: 1.5;
    color: var(--text);
    min-height: 2.4em;
  }
  .agent-task.empty { color: var(--muted); font-style: italic; }

  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.55} }
  .agent.ACTIVE .agent-task { animation: shimmer 2.4s ease-in-out infinite; }

  .agent-ts {
    margin-top: 8px;
    font-size: 0.63rem;
    color: var(--muted);
  }

  /* ── Activity Feed ───────────────────────────────────────────── */
  .feed {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .feed-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.63rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--muted);
  }
  .feed-count {
    background: var(--border);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 0.6rem;
  }

  .feed-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 3px 0;
    display: flex;
    flex-direction: column-reverse; /* newest at bottom */
  }
  .feed-scroll::-webkit-scrollbar { width: 3px; }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .feed-row {
    display: grid;
    grid-template-columns: 20px 48px 72px 1fr;
    align-items: baseline;
    padding: 4px 20px;
    font-size: 0.77rem;
    line-height: 1.45;
    animation: fadeIn 0.25s ease;
  }
  .feed-row:hover { background: rgba(255,255,255,.02); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

  .feed-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    align-self: center;
    justify-self: center;
  }
  .dot-info    { background: var(--blue); }
  .dot-success { background: var(--green); }
  .dot-warning { background: var(--yellow); }
  .dot-error   { background: var(--red); }

  .feed-time  { color: var(--muted); font-size: 0.68rem; font-variant-numeric: tabular-nums; }
  .feed-agent { color: var(--purple); font-size: 0.68rem; font-weight: 700;
                text-transform: uppercase; letter-spacing: 0.3px; overflow: hidden;
                text-overflow: ellipsis; white-space: nowrap; }
  .feed-msg   { color: var(--text); word-break: break-word; }

  /* ── Responsive ──────────────────────────────────────────────── */
  @media (max-width: 860px) {
    #agents-grid { grid-template-columns: repeat(2, 1fr); }
    .agent:nth-child(2) { border-right: none; }
    .agent:nth-child(1),
    .agent:nth-child(2) { border-bottom: 1px solid var(--border); }
  }
  @media (max-width: 500px) {
    #agents-grid { grid-template-columns: 1fr; }
    .agent { border-right: none !important; border-bottom: 1px solid var(--border); }
    .agent:last-child { border-bottom: none; }
    header { padding: 9px 14px; gap: 10px; }
    .feed-row { grid-template-columns: 16px 40px 62px 1fr; padding: 4px 14px; }
    .metrics .metric:nth-child(3),
    .metrics .metric:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">⚡ Sai Ops <span class="logo-sub">/ OpenClaw</span></div>
  <div class="divider"></div>
  <div class="metrics">
    <div class="metric m-done">
      <span class="metric-val" id="m-completed">—</span>
      <span class="metric-lbl">done</span>
    </div>
    <div class="metric m-active">
      <span class="metric-val" id="m-active">—</span>
      <span class="metric-lbl">active</span>
    </div>
    <div class="metric m-failed">
      <span class="metric-val" id="m-failed">—</span>
      <span class="metric-lbl">failed</span>
    </div>
    <div class="metric" style="color:var(--muted)">
      <span class="metric-val" id="m-messages">—</span>
      <span class="metric-lbl">msgs</span>
    </div>
  </div>
  <div class="spacer"></div>
  <span id="uptime"></span>
  <span id="conn-status" class="connecting">● Connecting…</span>
  <div class="live"><div class="pulse"></div>LIVE</div>
</header>

<!-- Agents -->
<div id="agents-grid"></div>

<!-- Feed -->
<div class="feed">
  <div class="feed-header">
    Activity
    <span class="feed-count" id="feed-count">0</span>
  </div>
  <div class="feed-scroll" id="feed-list"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
const agentState = {};
let feedItems = [];

// ── Helpers ───────────────────────────────────────────────────────
function relTime(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 5)    return 'now';
  if (d < 60)   return `${d}s`;
  if (d < 3600) return `${Math.floor(d/60)}m`;
  return `${Math.floor(d/3600)}h`;
}

function fmtUptime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sc = s % 60;
  if (h) return `up ${h}h ${m}m`;
  if (m) return `up ${m}m ${sc}s`;
  return `up ${sc}s`;
}

function agentLabel(id) { return agentState[id]?.name ?? id; }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render agents ─────────────────────────────────────────────────
function renderAgents(agents) {
  const grid = document.getElementById('agents-grid');
  agents.forEach(a => {
    agentState[a.id] = a;
    let card = document.getElementById(`agent-${a.id}`);
    if (!card) {
      card = document.createElement('div');
      card.id = `agent-${a.id}`;
      grid.appendChild(card);
    }
    card.className = `agent ${a.status}`;
    card.innerHTML = `
      <div class="agent-row">
        <div class="agent-id">
          <span class="agent-emoji">${a.emoji}</span>
          <span class="agent-name">${a.name}</span>
        </div>
        <span class="agent-status">${a.status}</span>
      </div>
      <div class="agent-task ${a.task ? '' : 'empty'}">${a.task ? esc(a.task) : 'Idle'}</div>
      <div class="agent-ts" data-ts="${a.lastSeen}">${relTime(a.lastSeen)}</div>
    `;
  });
}

// ── Render feed ───────────────────────────────────────────────────
function renderFeedItem(item) {
  const list = document.getElementById('feed-list');
  const div = document.createElement('div');
  div.className = 'feed-row';
  div.innerHTML = `
    <div class="feed-dot dot-${item.type ?? 'info'}"></div>
    <span class="feed-time" data-ts="${item.ts}">${relTime(item.ts)}</span>
    <span class="feed-agent">${agentLabel(item.agentId)}</span>
    <span class="feed-msg">${esc(item.message)}</span>
  `;
  list.appendChild(div);
}

function renderFeedBatch(items) {
  const list = document.getElementById('feed-list');
  list.innerHTML = '';
  items.forEach(renderFeedItem);
  document.getElementById('feed-count').textContent = items.length;
}

// ── Metrics ───────────────────────────────────────────────────────
function renderMetrics(m) {
  document.getElementById('m-completed').textContent = m.tasksCompleted.toLocaleString();
  document.getElementById('m-active').textContent    = m.tasksActive.toLocaleString();
  document.getElementById('m-failed').textContent    = m.tasksFailed.toLocaleString();
  document.getElementById('m-messages').textContent  = m.messagesProcessed.toLocaleString();
  if (m.uptimeMs != null)
    document.getElementById('uptime').textContent = fmtUptime(m.uptimeMs);
}

// ── Timestamp ticker ──────────────────────────────────────────────
setInterval(() => {
  document.querySelectorAll('[data-ts]').forEach(el => {
    const ts = parseInt(el.dataset.ts, 10);
    if (!isNaN(ts)) el.textContent = relTime(ts);
  });
}, 5000);

// ── SSE ───────────────────────────────────────────────────────────
let es;
function connect() {
  setConnStatus('connecting');
  es = new EventSource('/api/stream');
  es.addEventListener('agents',   e => renderAgents(JSON.parse(e.data)));
  es.addEventListener('metrics',  e => renderMetrics(JSON.parse(e.data)));
  es.addEventListener('feed',     e => { feedItems = JSON.parse(e.data); renderFeedBatch(feedItems); });
  es.addEventListener('activity', e => {
    const item = JSON.parse(e.data);
    feedItems.push(item);
    if (feedItems.length > 200) feedItems.shift();
    renderFeedItem(item);
    document.getElementById('feed-count').textContent = feedItems.length;
  });
  es.onopen  = () => setConnStatus('connected');
  es.onerror = () => { setConnStatus('disconnected'); es.close(); setTimeout(connect, 3000); };
}

function setConnStatus(s) {
  const el = document.getElementById('conn-status');
  el.className = s;
  el.textContent = s === 'connected' ? '● Connected' : s === 'connecting' ? '● Connecting…' : '● Disconnected';
}

connect();
</script>
</body>
</html>
